name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK platform 36
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" || \
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Decode debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || 'placeholder_key' }}" > .env

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --no-build-cache --info 2>&1 | tail -100

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: math-rpg-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
